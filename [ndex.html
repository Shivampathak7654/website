<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>सरकारी नौकरी पोर्टल | India Gov Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --saffron:#E8500A;
  --saffron2:#FF6B2B;
  --navy:#0B2545;
  --navy2:#1A3A6C;
  --green:#0A7C3E;
  --green2:#12A052;
  --gold:#F4A827;
  --red:#C0392B;
  --white:#fff;
  --bg:#F0F4F8;
  --card:#fff;
  --border:#DDE3EC;
  --text:#1A2336;
  --muted:#64748B;
  --radius:10px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

.topbar{background:var(--navy);color:rgba(255,255,255,.8);font-size:12px;padding:5px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.topbar a{color:var(--gold);text-decoration:none;margin-left:12px}

.header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:12px}
.logo-emblem{width:52px;height:52px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid var(--gold);flex-shrink:0}
.logo-text h1{color:#fff;font-size:20px;font-weight:800;line-height:1.1}
.logo-text p{color:rgba(255,255,255,.65);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.header-search{display:flex;gap:8px;flex:1;max-width:460px}
.header-search input{flex:1;padding:10px 14px;border:none;border-radius:8px;font-size:13px;background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.2);outline:none}
.header-search input::placeholder{color:rgba(255,255,255,.5)}
.header-search input:focus{border-color:var(--gold);background:rgba(255,255,255,.18)}
.search-btn{padding:10px 18px;background:var(--saffron);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap}
.search-btn:hover{background:var(--saffron2)}

.nav{background:var(--navy2);display:flex;overflow-x:auto;border-top:1px solid rgba(255,255,255,.08)}
.nav-btn{color:rgba(255,255,255,.75);background:none;border:none;padding:12px 18px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;font-family:inherit}
.nav-btn:hover,.nav-btn.active{color:#fff;border-bottom-color:var(--saffron);background:rgba(255,107,43,.15)}

.ticker{background:var(--red);color:#fff;display:flex;align-items:center;overflow:hidden;height:36px}
.ticker-label{background:var(--gold);color:var(--navy);padding:0 14px;font-weight:800;font-size:11px;letter-spacing:1px;white-space:nowrap;height:100%;display:flex;align-items:center;flex-shrink:0}
.ticker-wrap{flex:1;overflow:hidden}
.ticker-inner{display:inline-flex;animation:ticker 35s linear infinite;white-space:nowrap;font-size:12.5px;font-weight:500}
.ticker-inner span{margin:0 32px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.state-bar{background:#fff;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.state-bar label{font-weight:700;color:var(--navy);font-size:13px;white-space:nowrap}
.state-select{padding:8px 12px;border:2px solid var(--saffron);border-radius:8px;font-size:13px;color:var(--navy);background:var(--white);cursor:pointer;min-width:190px;font-family:inherit}
.state-pill{background:var(--saffron);color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700}

.wrap{max-width:1260px;margin:0 auto;padding:0 16px}
.layout{display:grid;grid-template-columns:1fr 320px;gap:20px;padding:20px 0}

.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:17px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:4px;height:20px;background:var(--saffron);border-radius:2px;display:block}
.see-all{color:var(--saffron);font-size:12px;font-weight:700;border:1.5px solid var(--saffron);padding:5px 12px;border-radius:6px;text-decoration:none;cursor:pointer;background:none}
.see-all:hover{background:var(--saffron);color:#fff}

.cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.cat-pill{padding:7px 16px;border-radius:24px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.cat-pill:hover{border-color:var(--saffron);color:var(--saffron)}
.cat-pill.on{background:var(--saffron);color:#fff;border-color:var(--saffron)}
.cat-pill .badge{background:rgba(255,255,255,.35);font-size:10px;padding:1px 6px;border-radius:10px}
.cat-pill.on .badge{background:rgba(0,0,0,.2)}

.exam-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.exam-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);padding:0;overflow:hidden;transition:.2s;cursor:pointer}
.exam-card:hover{border-color:var(--saffron);box-shadow:0 4px 20px rgba(232,80,10,.1)}
.exam-card-head{display:flex;align-items:center;gap:14px;padding:14px 16px}
.ec-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ec-icon.saffron{background:#FFF0E8}
.ec-icon.green{background:#E8F8EE}
.ec-icon.blue{background:#E8EEFF}
.ec-icon.purple{background:#F3E8FF}
.ec-info{flex:1}
.ec-info h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px;line-height:1.3}
.ec-info .ec-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.ec-info .ec-meta span{display:flex;align-items:center;gap:3px}
.ec-right{text-align:right;flex-shrink:0}
.ec-date{font-size:11px;color:var(--muted);margin-bottom:5px}
.ec-date strong{display:block;font-size:13px;color:var(--saffron);font-weight:700}
.badge-new{background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;vertical-align:middle;margin-left:5px;letter-spacing:.5px}
.exam-card-foot{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:#FAFBFD}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:.2s;text-decoration:none}
.btn-primary{background:var(--saffron);color:#fff}
.btn-primary:hover{background:#c94008}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#075e2e}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--navy);background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-blue{background:#2563EB;color:#fff}
.btn-blue:hover{background:#1d4ed8}

.sidebar{display:flex;flex-direction:column;gap:16px}
.scard{background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden}
.scard-head{background:var(--navy);color:#fff;padding:11px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.scard-body{padding:14px}
.slist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.slist-item:last-child{border-bottom:none;padding-bottom:0}
.slist-item:hover .slist-title{color:var(--saffron)}
.slist-dot{width:8px;height:8px;border-radius:50%;background:var(--saffron);flex-shrink:0;margin-top:6px}
.slist-dot.green{background:var(--green)}
.slist-dot.blue{background:#2563EB}
.slist-title{font-size:13px;font-weight:600;color:var(--navy);line-height:1.4;margin-bottom:2px}
.slist-sub{font-size:11px;color:var(--muted)}
.slist-btn{margin-top:5px}

.qlink{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;text-decoration:none;color:var(--text);transition:.15s}
.qlink:last-child{border-bottom:none}
.qlink:hover{color:var(--saffron)}
.qlink:hover .qlink-arrow{transform:translateX(3px)}
.qlink-icon{font-size:20px;flex-shrink:0}
.qlink-text{flex:1;font-size:13px;font-weight:500}
.qlink-arrow{color:var(--muted);font-size:14px;transition:.2s}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:var(--radius);padding:16px;text-align:center;border:1.5px solid var(--border)}
.stat .n{font-size:22px;font-weight:800;color:var(--saffron)}
.stat .l{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}

.page{display:none}
.page.active{display:block}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(11,37,69,.65);z-index:9000;overflow-y:auto;padding:20px}
